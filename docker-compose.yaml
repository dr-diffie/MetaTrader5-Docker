version: "3"

services:
  mt5:
    build: .
    container_name: mt5
    volumes:
      - ./config:/config
    ports:
      - 3000:3000
      - 8001:8001
    environment:
      - CUSTOM_USER=mt5user
      - PASSWORD=mt5password
    # This block stops MT5 from throwing the debugger error
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
